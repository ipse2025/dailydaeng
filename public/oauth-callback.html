<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>인증 처리 중...</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding-top: 40px; color: #334155; background: #F8FAFC; }
    .spinner { width: 32px; height: 32px; border: 3px solid #CBD5E1; border-top-color: #0EA5E9; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 16px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>인증 완료. 창이 자동으로 닫힙니다.</p>
  <script>
  (function () {
    var STORAGE_KEY = 'dailydaeng_oauth_response'
    var MSG_TYPE    = 'dailydaeng_oauth_response'

    var hash = window.location.hash ? window.location.hash.substring(1) : ''
    var params = new URLSearchParams(hash)
    var payload = {
      type:         MSG_TYPE,
      state:        params.get('state'),
      access_token: params.get('access_token'),
      token_type:   params.get('token_type'),
      expires_in:   params.get('expires_in'),
      error:        params.get('error') || params.get('error_description'),
      ts:           Date.now()
    }

    // 채널 1: localStorage (storage 이벤트는 다른 창에서 trigger됨)
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload))
    } catch (e) {
      console.error('localStorage write failed:', e)
    }

    // 채널 2: postMessage (opener가 살아있으면 즉시 전달)
    try {
      var opener = null
      try { opener = window.opener } catch (_) {}
      if (opener) {
        try { opener.postMessage(payload, window.location.origin) } catch (e) {
          console.error('postMessage failed:', e)
        }
      }
    } catch (e) {
      console.error('opener access failed:', e)
    }

    // 채널 3: BroadcastChannel (같은 origin 간 통신, COOP에 영향 안 받음)
    try {
      if ('BroadcastChannel' in window) {
        var bc = new BroadcastChannel('dailydaeng_oauth')
        bc.postMessage(payload)
        setTimeout(function () { try { bc.close() } catch (_) {} }, 100)
      }
    } catch (e) {
      console.error('BroadcastChannel failed:', e)
    }

    setTimeout(function () { window.close() }, 300)
  })()
  </script>
</body>
</html>
